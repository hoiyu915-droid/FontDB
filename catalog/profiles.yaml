  - id: cjk_fantasy_pairing
    status: draft
    archetype: serif_display
    voices: [fantasy, cultural]
    roles: [cover_title, title, decorative]
    locales: [zh-Hant, zh-Hans, ja, en]
    treatment: {weight: 750, tracking_em: 0.02, line_height: 1.0, effects: [ornamental_frame]}
    constraints: {body_text_allowed: false, max_title_chars: 8, min_contrast_ratio: 4.5}
