  - id: retro_print
    status: draft
    archetype: display_custom
    voices: [cultural, playful]
    roles: [cover_title, title, decorative]
    locales: [zh-Hant, zh-Hans]
    treatment: {weight: 800, tracking_em: 0.01, line_height: 1.0, effects: [ink_bleed, paper_texture]}
    constraints: {body_text_allowed: false, max_title_chars: 10, min_contrast_ratio: 4.5}
    font_stack: []
    prompt_constraints: [mid-century Chinese print lettering, limited ink spread, aged paper separate from glyph]

  - id: neon_sign
    status: draft
    archetype: display_custom
    voices: [playful, urgent]
    roles: [cover_title, decorative]
    locales: [zh-Hant, zh-Hans]
