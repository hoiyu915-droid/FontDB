  - id: pixel_game
    status: draft
    archetype: pixel
    voices: [playful, technical]
    roles: [title, label, decorative]
    locales: [zh-Hant, zh-Hans, ja]
    treatment: {weight: bitmap, tracking_em: 0.0, line_height: 1.0, effects: [pixel_grid]}
    constraints: {body_text_allowed: false, max_title_chars: 12, min_contrast_ratio: 4.5}
    font_stack: []
    prompt_constraints: [consistent pixel grid, no antialiasing simulation, preserve CJK recognizability]

  - id: sports_impact
    status: draft
    archetype: sans_condensed
    voices: [urgent, authoritative]
    roles: [cover_title, title]
    locales: [zh-Hant, zh-Hans, ja]
    treatment: {weight: 900, tracking_em: -0.03, line_height: 0.95, effects: [shear, outer_stroke]}
    constraints: {body_text_allowed: false, max_title_chars: 8, min_contrast_ratio: 7.0}
    font_stack: []
    prompt_constraints: [forward-sheared heavy CJK sans, intact strokes, restrained outline, no speed-line intrusion]

  - id: gothic_fantasy
    status: draft
    archetype: blackletter
    voices: [fantasy]
    roles: [cover_title, decorative]
    locales: [en]
    treatment: {weight: 700, tracking_em: 0.03, line_height: 1.0, effects: []}
    constraints: {body_text_allowed: false, max_title_chars: 5, min_contrast_ratio: 4.5}
    font_stack: []
    prompt_constraints: [blackletter reserved for Latin display, pair CJK with a compatible serif rather than fake CJK blackletter]

  - id: outline_editorial
    status: draft
    archetype: display_custom
    voices: [editorial, premium, technical]
    roles: [cover_title, title, decorative]
    locales: [zh-Hant, zh-Hans, ja]
    treatment: {weight: 400, tracking_em: 0.05, line_height: 1.1, effects: [outline_only]}
    constraints: {body_text_allowed: false, max_title_chars: 12, min_contrast_ratio: 4.5}
    font_stack: []
    prompt_constraints: [single-line or hairline-outline CJK construction, generous internal space, no impact shadow, preserve recognizability]

  - id: architectural_display
    status: draft
    archetype: serif_ming
    voices: [authoritative, cultural, technical]
    roles: [cover_title, title, section_title, label]
    locales: [zh-Hant, zh-Hans, ja]
    treatment: {weight: 500, tracking_em: 0.05, line_height: 1.1, effects: [engraved_optional]}
    constraints: {body_text_allowed: false, max_title_chars: 14, min_contrast_ratio: 4.5}
    font_stack: []
    prompt_constraints: [architectural CJK display with measured proportions, monumental spacing, engraving separate from glyph skeleton]

  - id: western_woodtype
    status: draft
    archetype: display_custom
    voices: [cultural, playful, authoritative]
    roles: [cover_title, title, decorative]
    locales: [zh-Hant, zh-Hans, en]
    treatment: {weight: 850, tracking_em: 0.0, line_height: 1.0, effects: [woodblock, distress]}
    constraints: {body_text_allowed: false, max_title_chars: 8, min_contrast_ratio: 4.5}
    font_stack: []
